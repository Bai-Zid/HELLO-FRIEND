<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Diagnostics</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* 1. Terminal Hacking Loader Style */
        #loader-container { 
            background-color: #050505; 
            color: #00ff33; 
            font-family: 'Courier New', Courier, monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .terminal-box { width: 100%; max-width: 600px; text-align: left; }
        .terminal-text { font-size: 1.2rem; margin-bottom: 15px; min-height: 50px; line-height: 1.5; }
        .terminal-text::after { content: '█'; animation: blink 0.8s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        
        .progress-bar-container { width: 100%; height: 25px; border: 2px solid #00ff33; padding: 2px; background: transparent; }
        .progress { width: 0%; height: 100%; background-color: #00ff33; transition: width 0.08s linear; }

        /* 2. Modern Light UI Main Content */
        #main-content { 
            display: none; 
            background-color: #f4f7f6; 
            color: #333; 
            height: 100vh; 
            width: 100vw;
            position: relative;
        }
        .card {
            background: #ffffff;
            padding: 40px 50px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 450px;
        }
        .card h1 { font-size: 2rem; color: #2c3e50; margin-bottom: 15px; font-weight: 600; }
        .card p { color: #7f8c8d; font-size: 1rem; margin-bottom: 30px; }
        
        /* Fixed Button Layout Grid */
        .btn-wrapper { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
            position: relative; 
            height: 50px;
        }
        button { 
            padding: 12px 24px; 
            font-size: 1rem; 
            border: none; 
            cursor: pointer; 
            border-radius: 6px; 
            font-weight: 600; 
            transition: background 0.2s, transform 0.1s; 
            height: 50px;
        }
        #next-btn { background-color: #007bff; color: white; width: 100%; }
        #next-btn:hover { background-color: #0056b3; }
        
        /* Floating Close Button Style */
        #close-btn { 
            background-color: #eaeded; 
            color: #4a5568; 
            position: absolute; 
            width: calc(50% - 10px); 
            right: 0;
            top: 0;
            transition: all 0.15s ease-out;
            z-index: 10;
        }
        #close-btn:hover { background-color: #e2e8f0; }

        /* 3. Countdown Screen */
        #countdown-screen { 
            display: none; 
            background-color: #f4f7f6; 
            font-size: 7rem; 
            font-weight: bold; 
            color: #e74c3c; 
            height: 100vh;
            justify-content: center;
            align-items: center;
        }

        /* 4. Scare Screen Layout (Image + Text at Bottom) */
        #scare-screen { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100vw; height: 100vh; 
            background-color: black; 
            z-index: 99999; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            padding: 20px;
        }
        .scare-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 90%;
            max-height: 90%;
        }
        #scare-image { 
            max-width: 100%; 
            max-height: 75vh; 
            object-fit: contain; 
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }
        .scare-text {
            color: white;
            font-size: 3rem;
            font-weight: 900;
            margin-top: 25px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 10px rgba(255, 0, 0, 0.8);
            text-align: center;
            animation: pulse 1s infinite alternate;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }
    </style>
</head>
<body>

    <div id="loader-container">
        <div class="terminal-box">
            <div class="terminal-text" id="terminal-log">Initializing root exploit...</div>
            <div class="progress-bar-container">
                <div class="progress" id="progress"></div>
            </div>
        </div>
    </div>

    <div id="main-content">
        <div class="card">
            <h1>Kemon aso bondhu? 😉</h1>
            <p>Tomr jonno ekta important messege ase</p>
            <div class="btn-wrapper" id="action-area">
                <button id="next-btn" onclick="startPrank()">Next</button>
                <button id="close-btn">Close</button>
            </div>
        </div>
    </div>

    <div id="countdown-screen">3</div>

    <div id="scare-screen">
        <div class="scare-content">
            <img id="scare-image" src="https://i.imgflip.com/973qww.jpg" alt="Pranked!">
            <div class="scare-text">SORRY Bondhu 🤣</div>
        </div>
        <audio id="scare-audio" src="twice.mp3" loop></audio>
    </div>

    <script>
        // --- 1. Terminal Hacking Simulator ---
        const logs = [
            "Connecting to secure server...",
            "Bypassing firewall protocols...",
            "Injecting payload package...",
            "Extracting user credentials...",
            "System access granted. Parsing UI..."
        ];
        
        let progress = document.getElementById('progress');
        let logText = document.getElementById('terminal-log');
        let count = 0;

        let loadingInterval = setInterval(() => {
            count++;
            progress.style.width = count + '%';
            
            if (count === 20) logText.innerText = logs[1];
            if (count === 45) logText.innerText = logs[2];
            if (count === 70) logText.innerText = logs[3];
            if (count === 90) logText.innerText = logs[4];

            if (count >= 100) {
                clearInterval(loadingInterval);
                document.getElementById('loader-container').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            }
        }, 50);

        // --- 2. Advanced Runaway Close Button ---
        const closeBtn = document.getElementById('close-btn');
        let hasMoved = false;

        function escapeButton(e) {
            if (!hasMoved) {
                closeBtn.style.position = 'fixed';
                hasMoved = true;
            }

            const padding = 40; 
            const maxX = window.innerWidth - closeBtn.clientWidth - padding;
            const maxY = window.innerHeight - closeBtn.clientHeight - padding;

            let randomX = Math.random() * maxX + padding/2;
            let randomY = Math.random() * maxY + padding/2;

            if (e && Math.abs(randomX - e.clientX) < 100 && Math.abs(randomY - e.clientY) < 100) {
                randomX = (randomX + 150) % maxX;
                randomY = (randomY + 150) % maxY;
            }

            closeBtn.style.left = randomX + 'px';
            closeBtn.style.top = randomY + 'px';
        }

        closeBtn.addEventListener('mouseenter', escapeButton);
        closeBtn.addEventListener('mousemove', escapeButton);
        closeBtn.addEventListener('click', (e) => {
            e.preventDefault();
            escapeButton(e);
        });

        // --- 3. Light UI Next Step & Scare Trigger ---
        function startPrank() {
            document.getElementById('main-content').style.display = 'none';
            const countdownScreen = document.getElementById('countdown-screen');
            countdownScreen.style.display = 'flex';

            let timeLeft = 3;
            countdownScreen.innerText = timeLeft;

            let timer = setInterval(() => {
                timeLeft--;
                if (timeLeft > 0) {
                    countdownScreen.innerText = timeLeft;
                } else {
                    clearInterval(timer);
                    countdownScreen.style.display = 'none';
                    
                    document.getElementById('scare-screen').style.display = 'flex';
                    const audio = document.getElementById('scare-audio');
                    audio.volume = 1.0; 
                    audio.play().catch(err => console.log("Audio play blocked by browser. Click-activated so it should work fine."));
                }
            }, 1000);
        }
    </script>
</body>
</html>
